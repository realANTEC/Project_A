name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deploy at a time; let an in-flight deploy finish (no broken half-deploys).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build · Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The site lives at https://realantec.github.io/Project_A/ — the base goes in as a
      # CLI flag (not vite.config.ts) so local dev keeps base '/'.
      - name: Build
        run: npm run build -- --base=/Project_A/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURN_URL: ${{ secrets.VITE_TURN_URL }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
          VITE_GIPHY_API_KEY: ${{ secrets.VITE_GIPHY_API_KEY }}

      # GitHub Pages has no rewrites; serving index.html as 404.html makes deep links
      # (e.g. shared /p/:id URLs) load the SPA, which then routes client-side.
      - name: SPA fallback for deep links
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
